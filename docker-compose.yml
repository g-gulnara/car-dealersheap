version: '3.8'

services:
  postgres-order:
    image: postgres:15
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks:
      - car-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-storage:
    image: postgres:15
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5434:5432"
    volumes:
      - postgres_storage_data:/var/lib/postgresql/data
    networks:
      - car-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d storage_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: keycloak/keycloak:26.0.0
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command:
      - start-dev
      - --import-realm
    ports:
      - "8180:8080"
    networks:
      - car-network
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: INTERNAL://:9094,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9094,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - car-network
  order-service:
    ports:
      - "8080:8080"
    build:
      context: ./
      dockerfile: order-service/src/Dockerfile
    container_name: order-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-order:5432/order_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=user
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=order-service
      - OTEL_TRACES_EXPORTER=otlp
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - car-network

  storage-service:
    ports:
      - "8081:8081"
      - "9090:9090"
    build:
      context: ./
      dockerfile: storage-service/src/Dockerfile
    container_name: storage-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9094
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-storage:5432/storage_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=user
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=storage-service
      - OTEL_TRACES_EXPORTER=otlp
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - car-network
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    command: [ "--config=/etc/otel/collector.yaml" ]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/collector.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - car-network

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo/config.yaml
    ports:
      - "3200:3200"
    networks:
      - car-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    networks:
      - car-network

networks:
  car-network:
    driver: bridge

volumes:
  postgres_order_data:
  postgres_storage_data: