syntax = "proto3";

package ru.gareeva.system.grpc;

option java_multiple_files = true;
option java_package = "ru.gareeva.system.grpc";
option java_outer_classname = "CarProto";

message Empty {}

message CarIdRequest {
  string id = 1;
}

message CarResponse {
  string id = 1;
  string brand = 2;
  string model_name = 3;
  string body_style = 4;
  string fuel_type = 5;
  string transmission = 6;
  string drive_train = 7;
  int32 engine_power = 8;
  int32 engine_capacity = 9;
  double price = 10;
  bool is_reserved = 11;
}

message CarListResponse {
  repeated CarResponse cars = 1;
}

service CarService {
  rpc GetAvailableCars (Empty) returns (CarListResponse);
  rpc GetCarById (CarIdRequest) returns (CarResponse);
}