spring:
  datasource:
    url: jdbc:postgresql://postgres-order:5432/order_db
    username: user
    password: user
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/Toma/protocol/openid-connect/certs

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9094}
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml

  application:
    name: order-service

server:
  port: 8080

grpc:
  client:
    storage-service:
      address: static://storage-service:9090
      negotiation-type: plaintext

keycloak:
  realm: Toma
  auth-server-url: http://keycloak:8080
  client-id: admin
  client-secret: secret-key

logging:
  level:
    org.springframework.security: DEBUG
environment:
  - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
  - OTEL_SERVICE_NAME=order-service
  - OTEL_TRACES_EXPORTER=otlp