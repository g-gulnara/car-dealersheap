databaseChangeLog:
  - changeSet:
      id: 20260420-outbox-fix
      author: student
      changes:
        - createTable:
            tableName: outbox_event
            columns:
              - column: { name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: topic, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: payload, type: TEXT, constraints: { nullable: false } }
              - column: { name: sent, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: "TIMESTAMP WITH TIME ZONE" }